<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>scope-youtube icon previews</title>
<style>
  body { background: #15151a; color: #ddd; font: 14px system-ui, sans-serif; margin: 0; padding: 32px; }
  h1 { font-weight: 500; margin: 0 0 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; }
  .card { background: #1f1f25; border-radius: 12px; padding: 16px; text-align: center; }
  .card img { width: 160px; height: 160px; display: block; margin: 0 auto 8px; border-radius: 16px; }
  .card .small { width: 48px; height: 48px; opacity: 0.95; margin: 8px auto 0; border-radius: 8px; }
  .name { color: #aaa; font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  .row { display: flex; gap: 12px; align-items: center; justify-content: center; }
</style>
</head>
<body>
<h1>scope-youtube — icon candidates</h1>
<div class="grid">
  <div class="card">
    <img src="icon-1-classic.svg" alt="">
    <div class="row"><img class="small" src="icon-1-classic.svg" alt=""></div>
    <div class="name">icon-1-classic</div>
  </div>
  <div class="card">
    <img src="icon-2-daydream.svg" alt="">
    <div class="row"><img class="small" src="icon-2-daydream.svg" alt=""></div>
    <div class="name">icon-2-daydream</div>
  </div>
  <div class="card">
    <img src="icon-3-filmstrip.svg" alt="">
    <div class="row"><img class="small" src="icon-3-filmstrip.svg" alt=""></div>
    <div class="name">icon-3-filmstrip</div>
  </div>
  <div class="card">
    <img src="icon-4-aperture.svg" alt="">
    <div class="row"><img class="small" src="icon-4-aperture.svg" alt=""></div>
    <div class="name">icon-4-aperture</div>
  </div>
  <div class="card">
    <img src="icon-5-minimal.svg" alt="">
    <div class="row"><img class="small" src="icon-5-minimal.svg" alt=""></div>
    <div class="name">icon-5-minimal</div>
  </div>
  <div class="card">
    <img src="icon-6-monogram.svg" alt="">
    <div class="row"><img class="small" src="icon-6-monogram.svg" alt=""></div>
    <div class="name">icon-6-monogram</div>
  </div>
</div>
</body>
</html>
